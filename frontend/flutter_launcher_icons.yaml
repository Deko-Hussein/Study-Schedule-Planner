# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"

  android: "launcher_icon"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/branding/launcher_foreground.png"
  adaptive_icon_foreground_inset: 12
  adaptive_icon_monochrome: "assets/branding/launcher_monochrome.png"

  ios: true
  remove_alpha_ios: true
  background_color_ios: "#2563EB"

  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#ffffff"
    theme_color: "#2563EB"

  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/icon/icon.png"
